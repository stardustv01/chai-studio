name: required-validation

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: "true"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  quality:
    name: quality-contracts
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - name: Install FFmpeg runtime
        run: brew install ffmpeg
      - run: pnpm install --frozen-lockfile
      - name: Install isolated Playwright Chromium
        run: pnpm exec playwright install chromium
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm schema:check
      - run: pnpm fixture:render
      - run: pnpm fixture:verify
      - run: pnpm test
      - run: pnpm p22:visual
      - run: pnpm security:check
      - run: pnpm security:audit
      - name: Reject silently rewritten generated or golden output
        run: git diff --exit-code -- packages/schema/src/generated fixtures/goldens
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-evidence
          path: |
            test-results
            reports
          retention-days: 14

  build:
    name: reproducible-build
    needs: quality
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: studio-build
          path: |
            apps/studio-server/dist
            apps/studio-web/dist
            packages/*/dist
          retention-days: 14

  end-to-end:
    name: local-shell-e2e
    needs: build
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - name: Install FFmpeg runtime
        run: brew install ffmpeg
      - run: pnpm install --frozen-lockfile
      - name: Install isolated Playwright Chromium
        run: pnpm exec playwright install chromium
      - run: pnpm build
      - run: pnpm browser:isolation
      - run: pnpm cli:package:check
      - run: pnpm test:e2e
      - run: pnpm test:e2e:first-run
      - run: pnpm test:e2e:authenticated
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browser-failure-evidence
          path: |
            reports/playwright
          retention-days: 14

  release-gate:
    name: protected-release-gate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [quality, build, end-to-end]
    runs-on: macos-15
    steps:
      - run: echo "All required build, test, security, fixture, schema, and browser gates passed."
