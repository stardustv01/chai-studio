name: required-validation

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: "true"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  quality:
    name: quality-contracts
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - name: Install FFmpeg runtime
        run: brew install ffmpeg
      - run: pnpm install --frozen-lockfile
      - name: Install isolated Playwright Chromium
        run: pnpm exec playwright install chromium
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm schema:check
      - run: pnpm fixture:render
      - run: pnpm fixture:verify
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm test:reporting
      - run: pnpm p22:visual
      - run: pnpm security:check
      - run: pnpm security:audit
      - name: Reject silently rewritten generated or golden output
        run: git diff --exit-code -- packages/schema/src/generated fixtures/goldens
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-evidence
          path: |
            test-results
            reports
          retention-days: 14

  build:
    name: reproducible-build
    needs: quality
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: studio-build
          path: |
            apps/studio-server/dist
            apps/studio-web/dist
            packages/*/dist
          retention-days: 14

  end-to-end:
    name: local-shell-e2e
    needs: build
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - name: Install FFmpeg runtime
        run: brew install ffmpeg
      - run: pnpm install --frozen-lockfile
      - name: Install isolated Playwright Chromium
        run: pnpm exec playwright install chromium
      - run: pnpm build
      - run: pnpm browser:isolation
      - run: pnpm cli:package:check
      - run: pnpm test:e2e
      - run: pnpm test:e2e:first-run
      - run: pnpm test:e2e:authenticated
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browser-failure-evidence
          path: |
            reports/playwright
          retention-days: 14

  release-gate:
    name: protected-release-gate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, build, end-to-end]
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - run: pnpm release:tag:check
      - name: Install FFmpeg runtime
        run: brew install ffmpeg
      - id: install
        run: pnpm install --frozen-lockfile
      - name: Install isolated Playwright Chromium
        run: pnpm exec playwright install chromium
      - id: release_build
        run: pnpm release:build
      - name: Build exact npm registry runtime
        run: pnpm run cli:runtime:build
      - run: pnpm release:bundle -- --source-manifest evidence/p27/release-manifest.json
      - run: pnpm release:bundle:verify
      - id: governance
        name: Validate frozen governance, current isolation, licenses, and release manifest
        run: pnpm release:governance:check
        env:
          CHAI_STUDIO_PLANNING_ROOT: governance/planning-baseline
      - id: technical
        name: Validate P28 technical evidence
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: pnpm p28:technical-contract
      - name: Validate exact P28 version manifest
        if: ${{ always() && steps.release_build.outcome == 'success' }}
        run: node scripts/generate-p28-version-manifest.mjs --check
      - name: Validate explicit owner-authorized final evidence
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: node scripts/validate-p28-final-contract.mjs --require-final-gate
